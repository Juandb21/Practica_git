<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Actualizar tarea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-0evHe/X+R7YkIZDRvuzKMRqM+OrBnVFBL6DOitfPri4tjfHxaWutUpFmBp4vmVor" crossorigin="anonymous">
</head>
<body>
    <main class="container py-5">
        <h1 class="text-center mb-4">Actualizar tarea</h1>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form method="post" action="{% url 'app:update' task.id %}">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="title" class="form-label">Titulo</label>
                        <input type="text" class="form-control" name="title" id="title" value="{{ task.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">Descripción</label>
                        <textarea name="description" class="form-control" id="description">{{ task.description }}</textarea>
                    </div>
                    <button type="submit" class="btn btn-primary">Guardar cambios</button>
                    <a href="{% url 'app:index' %}" class="btn btn-secondary">Cancelar</a>
                </form>
            </div>
        </div>
    </main>
</body>
</html>
